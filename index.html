<!DOCTYPE html>
<html>
<head>
  <title>Dawn's ToDo App</title>
  <style>
    body { 
      font-family: Arial; 
      max-width: 600px; 
      margin: 50px auto;
      background-color: #fff8f0;
    }
    h1 {
      color: #ff8c00;
    }
    input { 
      padding: 8px; 
      width: 300px;
      border: 2px solid #ff8c00;
      border-radius: 4px;
    }
    button { 
      padding: 8px 15px;
      background-color: #ff8c00;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #ff7700;
    }
    ul { 
      list-style: none; 
      padding: 0; 
    }
    li { 
      padding: 10px; 
      border: 2px solid #ffa500; 
      margin: 5px 0;
      background-color: #fffaf0;
      border-radius: 4px;
    }
    .todo-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .todo-text {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .todo-text input[type="checkbox"] {
      cursor: pointer;
      width: 18px;
      height: 18px;
    }
    .todo-title {
      flex: 1;
    }
    .todo-title.completed {
      text-decoration: line-through;
      color: #999;
    }
    .todo-time {
      font-size: 12px;
      color: #999;
      min-width: 150px;
    }
    li button {
      background-color: #ff4500;
      padding: 5px 10px;
      font-size: 12px;
    }
    li button:hover {
      background-color: #ff3300;
    }
  </style>
</head>
<body>
  <h1>🍊 Dawn's ToDo App</h1>
  <input type="text" id="todoInput" placeholder="Add a todo...">
  <button onclick="addTodo()">Add</button>
  <ul id="todoList"></ul>

  <script>
    const API = 'http://localhost:3000';

    async function loadTodos() {
      const res = await fetch(`${API}/todos`);
      const todos = await res.json();
      const list = document.getElementById('todoList');
      list.innerHTML = todos.map(t => {
        const date = new Date(t.created_at);
        const formattedTime = date.toLocaleString();
        return `
          <li>
            <div class="todo-content">
              <div class="todo-text">
                <input type="checkbox" ${t.completed ? 'checked' : ''} 
                  onchange="toggleTodo(${t.id}, this.checked)">
                <span class="todo-title ${t.completed ? 'completed' : ''}">${t.title}</span>
              </div>
              <span class="todo-time">${formattedTime}</span>
              <button onclick="deleteTodo(${t.id})">Delete</button>
            </div>
          </li>
        `;
      }).join('');
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const title = input.value.trim();
      if (!title) return;
      
      await fetch(`${API}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      loadTodos();
    }

    async function toggleTodo(id, completed) {
      await fetch(`${API}/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed })
      });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
      loadTodos();
    }

    loadTodos();
  </script>
</body>
</html>
