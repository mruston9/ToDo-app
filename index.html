<!DOCTYPE html>
<html>
<head>
  <title>Our ToDo List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body { 
      font-family: Arial, sans-serif; 
      background-color: #eceff1;
      padding: 15px;
    }
    h1 {
      color: #546e7a;
      font-size: 36px;
      margin-bottom: 20px;
    }
    input#todoInput { 
      padding: 12px; 
      width: 100%;
      border: 2px solid #607d8b;
      border-radius: 4px;
      font-size: 18px;
      margin-bottom: 10px;
    }
    .add-btn { 
      padding: 12px;
      background-color: #607d8b;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 18px;
      width: 100%;
      margin-bottom: 10px;
    }
    .add-btn:hover {
      background-color: #546e7a;
    }
    .filter-btn {
      padding: 10px;
      background-color: #90a4ae;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      margin-bottom: 15px;
    }
    .filter-btn:hover {
      background-color: #78909c;
    }
    ul { 
      list-style: none; 
      padding: 0; 
    }
    li { 
      padding: 12px; 
      border: 2px solid #90a4ae; 
      margin: 10px 0;
      background-color: #f5f7f8;
      border-radius: 4px;
    }
    .todo-container {
      display: flex;
      gap: 8px;
      align-items: flex-start;
    }
    .assignee-btn {
      width: 34px;
      height: 40px;
      border: none;
      border-radius: 4px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      flex-shrink: 0;
      color: white;
      padding: 0;
      margin: 0;
    }
    .assignee-unassigned {
      background-color: #b0bec5;
    }
    .assignee-M {
      background-color: #1e88e5;
    }
    .assignee-D {
      background-color: #fb8c00;
    }
    .todo-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex: 1;
    }
    .todo-item input[type="checkbox"] {
      width: 24px;
      height: 24px;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .todo-details {
      flex: 1;
    }
    .todo-title {
      font-size: 18px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      color: #37474f;
    }
    .todo-title.completed {
      text-decoration: line-through;
      color: #b0bec5;
    }
    .todo-time {
      font-size: 14px;
      color: #90a4ae;
      margin-top: 4px;
    }
    .todo-completed-time {
      font-size: 14px;
      color: #4caf50;
      margin-top: 2px;
    }
    .todo-controls {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
      align-items: stretch;
    }
    .reorder {
      display: flex;
      flex-direction: column;
      width: 34px;
      flex-shrink: 0;
    }
    .reorder button {
      background-color: #78909c;
      color: white;
      border: none;
      cursor: pointer;
      height: 20px;
      font-size: 14px;
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reorder button:first-child {
      border-radius: 4px 4px 0 0;
    }
    .reorder button:last-child {
      border-radius: 0 0 4px 4px;
      border-top: 1px solid #607d8b;
    }
    .reorder button:hover {
      background-color: #607d8b;
    }
    .delete-btn {
      background-color: #e53935;
      color: white;
      border: none;
      border-radius: 4px;
      width: 40px;
      height: 40px;
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .delete-btn:hover {
      background-color: #c62828;
    }
  </style>
</head>
<body>
  <h1>📋 Our ToDo List</h1>
  <input type="text" id="todoInput" placeholder="Add a todo...">
  <button class="add-btn" onclick="addTodo()">Add</button>
  <button class="filter-btn" id="filterBtn" onclick="toggleFilter()">Hide completed</button>
  <ul id="todoList"></ul>

  <script>
    const API = 'https://todo-app-rxai.onrender.com';

    // When true, completed items are hidden from the list.
    let hideCompleted = false;

    // Convert characters that have special meaning in HTML into safe text,
    // so a todo title can never inject markup or scripts into the page.
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Return the CSS class and label for an assignee value.
    function assigneeDisplay(a) {
      if (a === 'M') return { cls: 'assignee-M', label: 'M' };
      if (a === 'D') return { cls: 'assignee-D', label: 'D' };
      return { cls: 'assignee-unassigned', label: '–' };
    }

    function toggleFilter() {
      hideCompleted = !hideCompleted;
      document.getElementById('filterBtn').textContent =
        hideCompleted ? 'Show completed' : 'Hide completed';
      loadTodos();
    }

    async function loadTodos() {
      const res = await fetch(`${API}/todos`);
      let todos = await res.json();

      // Apply the show/hide-completed filter before drawing.
      if (hideCompleted) {
        todos = todos.filter(t => !t.completed);
      }

      const list = document.getElementById('todoList');
      list.innerHTML = todos.map(t => {
        const date = new Date(t.created_at);
        const formattedTime = date.toLocaleString();
        const safeTitle = escapeHtml(t.title);
        const completedLine = t.completed_at
          ? `<div class="todo-completed-time">Completed: ${new Date(t.completed_at).toLocaleString()}</div>`
          : '';
        const assignee = assigneeDisplay(t.assignee);
        return `
          <li>
            <div class="todo-container">
              <button class="assignee-btn ${assignee.cls}" onclick="cycleAssignee(${t.id})">${assignee.label}</button>
              <div class="todo-item">
                <input type="checkbox" ${t.completed ? 'checked' : ''} 
                  onchange="toggleTodo(${t.id}, this.checked)">
                <div class="todo-details">
                  <div class="todo-title ${t.completed ? 'completed' : ''}">${safeTitle}</div>
                  <div class="todo-time">${formattedTime}</div>
                  ${completedLine}
                </div>
              </div>
              <div class="todo-controls">
                <div class="reorder">
                  <button onclick="moveTodo(${t.id}, 'up')">↑</button>
                  <button onclick="moveTodo(${t.id}, 'down')">↓</button>
                </div>
                <button class="delete-btn" onclick="deleteTodo(${t.id}, '${escapeHtml(t.title).replace(/'/g, "\\'")}')">×</button>
              </div>
            </div>
          </li>
        `;
      }).join('');
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const title = input.value.trim();
      if (!title) return;
      
      await fetch(`${API}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      loadTodos();
    }

    async function cycleAssignee(id) {
      await fetch(`${API}/todos/${id}/assign`, { method: 'POST' });
      loadTodos();
    }

    async function moveTodo(id, direction) {
      await fetch(`${API}/todos/${id}/move`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ direction })
      });
      loadTodos();
    }

    async function toggleTodo(id, completed) {
      await fetch(`${API}/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed })
      });
      loadTodos();
    }

    async function deleteTodo(id, title) {
      // Ask before permanently deleting, since there's no undo.
      const ok = confirm(`Delete "${title}"? This can't be undone.`);
      if (!ok) return;

      await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
      loadTodos();
    }

    loadTodos();
  </script>
</body>
</html>
