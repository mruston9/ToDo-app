<!DOCTYPE html>
<html>
<head>
  <title>Our ToDo List</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body { 
      font-family: Arial, sans-serif; 
      background-color: #eceff1;
      padding: 15px;
    }
    h1 {
      color: #546e7a;
      font-size: 36px;
      margin-bottom: 20px;
    }
    input { 
      padding: 12px; 
      width: 100%;
      border: 2px solid #607d8b;
      border-radius: 4px;
      font-size: 18px;
      margin-bottom: 10px;
    }
    button { 
      padding: 12px;
      background-color: #607d8b;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 18px;
      width: 100%;
      margin-bottom: 15px;
    }
    button:hover {
      background-color: #546e7a;
    }
    ul { 
      list-style: none; 
      padding: 0; 
    }
    li { 
      padding: 12px; 
      border: 2px solid #90a4ae; 
      margin: 10px 0;
      background-color: #f5f7f8;
      border-radius: 4px;
    }
    .todo-container {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .todo-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      flex: 1;
    }
    .todo-item input[type="checkbox"] {
      width: 24px;
      height: 24px;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .todo-details {
      flex: 1;
    }
    .todo-title {
      font-size: 18px;
      word-wrap: break-word;
      overflow-wrap: break-word;
      color: #37474f;
    }
    .todo-title.completed {
      text-decoration: line-through;
      color: #b0bec5;
    }
    .todo-time {
      font-size: 14px;
      color: #90a4ae;
      margin-top: 4px;
    }
    .todo-controls {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }
    .control-btn {
      color: white;
      border: none;
      border-radius: 4px;
      width: 40px;
      height: 40px;
      font-size: 22px;
      cursor: pointer;
      padding: 0;
      margin: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .move-btn {
      background-color: #78909c;
    }
    .move-btn:hover {
      background-color: #607d8b;
    }
    .delete-btn {
      background-color: #455a64;
    }
    .delete-btn:hover {
      background-color: #37474f;
    }
  </style>
</head>
<body>
  <h1>📋 Our ToDo List</h1>
  <input type="text" id="todoInput" placeholder="Add a todo...">
  <button onclick="addTodo()">Add</button>
  <ul id="todoList"></ul>

  <script>
    const API = 'https://todo-app-rxai.onrender.com';

    // Convert characters that have special meaning in HTML into safe text,
    // so a todo title can never inject markup or scripts into the page.
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function loadTodos() {
      const res = await fetch(`${API}/todos`);
      const todos = await res.json();
      const list = document.getElementById('todoList');
      list.innerHTML = todos.map(t => {
        const date = new Date(t.created_at);
        const formattedTime = date.toLocaleString();
        const safeTitle = escapeHtml(t.title);
        return `
          <li>
            <div class="todo-container">
              <div class="todo-item">
                <input type="checkbox" ${t.completed ? 'checked' : ''} 
                  onchange="toggleTodo(${t.id}, this.checked)">
                <div class="todo-details">
                  <div class="todo-title ${t.completed ? 'completed' : ''}">${safeTitle}</div>
                  <div class="todo-time">${formattedTime}</div>
                </div>
              </div>
              <div class="todo-controls">
                <button class="control-btn move-btn" onclick="moveTodo(${t.id}, 'up')">↑</button>
                <button class="control-btn move-btn" onclick="moveTodo(${t.id}, 'down')">↓</button>
                <button class="control-btn delete-btn" onclick="deleteTodo(${t.id})">×</button>
              </div>
            </div>
          </li>
        `;
      }).join('');
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const title = input.value.trim();
      if (!title) return;
      
      await fetch(`${API}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      loadTodos();
    }

    async function moveTodo(id, direction) {
      await fetch(`${API}/todos/${id}/move`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ direction })
      });
      loadTodos();
    }

    async function toggleTodo(id, completed) {
      await fetch(`${API}/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed })
      });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
      loadTodos();
    }

    loadTodos();
  </script>
</body>
</html>
