<!DOCTYPE html>
<html>
<head>
  <title>Dawn's ToDo App</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body { 
      font-family: Arial, sans-serif; 
      background-color: #fff8f0;
      padding: 15px;
    }
    h1 {
      color: #ff8c00;
      font-size: 36px;
      margin-bottom: 20px;
    }
    input { 
      padding: 12px; 
      width: 100%;
      border: 2px solid #ff8c00;
      border-radius: 4px;
      font-size: 18px;
      margin-bottom: 10px;
    }
    button { 
      padding: 12px;
      background-color: #ff8c00;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 18px;
      width: 100%;
      margin-bottom: 15px;
    }
    button:hover {
      background-color: #ff7700;
    }
    ul { 
      list-style: none; 
      padding: 0; 
    }
    li { 
      padding: 12px; 
      border: 2px solid #ffa500; 
      margin: 10px 0;
      background-color: #fffaf0;
      border-radius: 4px;
    }
    .todo-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 8px;
    }
    .todo-item input[type="checkbox"] {
      width: 24px;
      height: 24px;
      margin-top: 2px;
      flex-shrink: 0;
    }
    .todo-details {
      flex: 1;
    }
    .todo-title {
      font-size: 18px;
      word-wrap: break-word;
      overflow-wrap: break-word;
    }
    .todo-title.completed {
      text-decoration: line-through;
      color: #999;
    }
    .todo-time {
      font-size: 14px;
      color: #999;
      margin-top: 4px;
    }
    .todo-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    li button {
      background-color: #ff4500;
      padding: 8px 16px;
      font-size: 16px;
    }
    li button:hover {
      background-color: #ff3300;
    }
  </style>
</head>
<body>
  <h1>🍊 Dawn's ToDo App</h1>
  <input type="text" id="todoInput" placeholder="Add a todo...">
  <button onclick="addTodo()">Add</button>
  <ul id="todoList"></ul>

  <script>
    const API = 'https://todo-app-rxai.onrender.com';

    async function loadTodos() {
      const res = await fetch(`${API}/todos`);
      const todos = await res.json();
      const list = document.getElementById('todoList');
      list.innerHTML = todos.map(t => {
        const date = new Date(t.created_at);
        const formattedTime = date.toLocaleString();
        return `
          <li>
            <div class="todo-item">
              <input type="checkbox" ${t.completed ? 'checked' : ''} 
                onchange="toggleTodo(${t.id}, this.checked)">
              <div class="todo-details">
                <div class="todo-title ${t.completed ? 'completed' : ''}">${t.title}</div>
                <div class="todo-time">${formattedTime}</div>
              </div>
            </div>
            <div class="todo-actions">
              <button onclick="deleteTodo(${t.id})">Delete</button>
            </div>
          </li>
        `;
      }).join('');
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const title = input.value.trim();
      if (!title) return;
      
      await fetch(`${API}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      loadTodos();
    }

    async function toggleTodo(id, completed) {
      await fetch(`${API}/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed })
      });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
      loadTodos();
    }

    loadTodos();
  </script>
</body>
</html>
