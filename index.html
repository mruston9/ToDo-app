<!DOCTYPE html>
<html>
<head>
  <title>Dawn's ToDo App</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }
  body { 
    font-family: Arial; 
    background-color: #fff8f0;
    font-size: 20px;
    padding: 10px;
  }
  h1 {
    color: #ff8c00;
    font-size: 40px;
    margin: 10px 0;
  }
  input { 
    padding: 15px; 
    width: 100%;
    border: 2px solid #ff8c00;
    border-radius: 4px;
    font-size: 18px;
    margin-bottom: 10px;
  }
  button { 
    padding: 15px 25px;
    background-color: #ff8c00;
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 18px;
    width: 100%;
    margin-bottom: 15px;
  }
  button:hover {
    background-color: #ff7700;
  }
  ul { 
    list-style: none; 
    padding: 0; 
  }
  li { 
    padding: 15px; 
    border: 2px solid #ffa500; 
    margin: 8px 0;
    background-color: #fffaf0;
    border-radius: 4px;
    font-size: 20px;
  }
  .todo-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }
  .todo-text {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .todo-text input[type="checkbox"] {
    cursor: pointer;
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }
  .todo-title {
    flex: 1;
    font-size: 20px;
  }
  .todo-title.completed {
    text-decoration: line-through;
    color: #999;
  }
  .todo-time {
    font-size: 16px;
    color: #999;
  }
  li button {
    background-color: #ff4500;
    padding: 10px 15px;
    font-size: 16px;
    flex-shrink: 0;
  }
  li button:hover {
    background-color: #ff3300;
  }
</style>
</head>
<body>
  <h1>🍊 Dawn's ToDo App</h1>
  <input type="text" id="todoInput" placeholder="Add a todo...">
  <button onclick="addTodo()">Add</button>
  <ul id="todoList"></ul>

  <script>
    const API = 'https://todo-app-rxai.onrender.com'; // Your actual Render URL

    async function loadTodos() {
      const res = await fetch(`${API}/todos`);
      const todos = await res.json();
      const list = document.getElementById('todoList');
      list.innerHTML = todos.map(t => {
        const date = new Date(t.created_at);
        const formattedTime = date.toLocaleString();
        return `
          <li>
            <div class="todo-content">
              <div class="todo-text">
                <input type="checkbox" ${t.completed ? 'checked' : ''} 
                  onchange="toggleTodo(${t.id}, this.checked)">
                <span class="todo-title ${t.completed ? 'completed' : ''}">${t.title}</span>
              </div>
              <span class="todo-time">${formattedTime}</span>
              <button onclick="deleteTodo(${t.id})">Delete</button>
            </div>
          </li>
        `;
      }).join('');
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const title = input.value.trim();
      if (!title) return;
      
      await fetch(`${API}/todos`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      loadTodos();
    }

    async function toggleTodo(id, completed) {
      await fetch(`${API}/todos/${id}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ completed })
      });
      loadTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/todos/${id}`, { method: 'DELETE' });
      loadTodos();
    }

    loadTodos();
  </script>
</body>
</html>
